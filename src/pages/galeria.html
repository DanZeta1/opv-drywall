<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <title>Galería - OPV Drywall</title>
</head>
<body>
  {{> header}}

  <section class="gallery">
    <div class="grids">
      <div class="rows">
        <div class="cols"><div class="pic"><img src="/assets/imagen1.jpg" alt="Trabajo 1" /></div></div>
        <div class="cols"><div class="pic"><img src="/assets/imagen2.jpg" alt="Trabajo 2" /></div></div>
        <div class="cols"><div class="pic"><img src="/assets/imagen3.jpg" alt="Trabajo 3" /></div></div>
        <div class="cols"><div class="pic"><img src="/assets/imagen4.jpg" alt="Trabajo 4" /></div></div>
        <div class="cols"><div class="pic"><img src="/assets/imagen5.jpg" alt="Trabajo 5" /></div></div>
        <div class="cols"><div class="pic"><img src="/assets/imagen6.jpg" alt="Trabajo 6" /></div></div>
        <div class="cols"><div class="pic"><img src="/assets/imagen7.jpg" alt="Trabajo 7" /></div></div>
        <div class="cols"><div class="pic"><img src="/assets/imagen9.jpg" alt="Trabajo 8" /></div></div>
      </div>
    </div>
  </section>

  {{> footer}}
  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
